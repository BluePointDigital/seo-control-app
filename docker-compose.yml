services:
  seo-control-app:
    build:
      context: .
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      DATA_DIR: /app/data
      WEB_ORIGIN: https://seo.your-domain.com
      APP_BASE_URL: https://seo.your-domain.com
      SECURE_COOKIES: "true"
      TRUST_PROXY: "true"
      PUBLIC_SIGNUP_ENABLED: "false"
      GOOGLE_REDIRECT_URI: https://seo.your-domain.com/api/org/google/callback
      APP_MASTER_KEY: change-this-long-random-string
      SESSION_SECRET: change-this-session-secret
    volumes:
      - ./docker-data:/app/data
    restart: unless-stopped
